  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

  <style>
    :root {
      --bg: #eef2f7;
      --paper: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --soft: #f3f6fb;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1e3a8a;
      --accent: #7c3aed;
      --sidebar: #0f172a;
      --sidebar-text: #e5e7eb;
      --sidebar-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.12), transparent 34%),
        var(--bg);
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      padding: 14px;
      backdrop-filter: blur(14px);
      background: rgba(238, 242, 247, 0.86);
      border-bottom: 1px solid rgba(229, 231, 235, 0.9);
    }

    .toolbar-inner {
      width: min(1000px, 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.28);
    }

    button.secondary {
      background: #ffffff;
      color: var(--primary-dark);
      border: 1px solid rgba(37, 99, 235, 0.18);
      box-shadow: none;
    }

    button.active {
      background: linear-gradient(135deg, var(--primary-dark), var(--accent));
      color: #fff;
      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.32);
    }

    .page-wrap {
      padding: 28px 16px 48px;
    }

    .resume {
      width: min(1120px, calc(100vw - 32px));
      min-height: 297mm;
      aspect-ratio: 210 / 297;
      height: auto;
      margin: 0 auto;
      background: var(--paper);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
      display: grid;
      grid-template-columns: 66mm 1fr;
      border-radius: 22px;
    }

    .sidebar {
      background:
        linear-gradient(180deg, rgba(37, 99, 235, 0.24), transparent 28%),
        var(--sidebar);
      color: var(--sidebar-text);
      padding: 24px 20px;
      overflow: hidden;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 18px;
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.22);
    }

    .sidebar h2 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      margin: 20px 0 10px;
      color: #fff;
    }

    .contact-item,
    .sidebar p,
    .sidebar li {
      color: var(--sidebar-muted);
      font-size: 9.6px;
      line-height: 1.45;
    }

    .contact-item {
      margin-bottom: 7px;
      word-break: break-word;
    }

    .skill-group {
      margin-bottom: 11px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    }

    .skill-group:last-child {
      border-bottom: 0;
    }

    .skill-group strong {
      display: block;
      margin-bottom: 6px;
      color: #fff;
      font-size: 9.8px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      font-size: 8.2px;
      color: #dbeafe;
      background: rgba(37, 99, 235, 0.18);
      border: 1px solid rgba(147, 197, 253, 0.16);
      padding: 3px 6px;
      border-radius: 999px;
      line-height: 1.25;
    }

    .education-item,
    .certification-item {
      margin-bottom: 9px;
    }

    .education-item strong,
    .certification-item strong {
      display: block;
      font-size: 9.6px;
      color: #fff;
      line-height: 1.35;
    }

    .education-item span {
      display: block;
      font-size: 8.9px;
      color: var(--sidebar-muted);
      line-height: 1.35;
      margin-top: 2px;
    }

    .main {
      padding: 26px 32px 24px;
      overflow: hidden;
    }

    .hero {
      position: relative;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 76px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 999px;
    }

    a:link, a:visited {
      color: #94a3b8;
      text-decoration: none;
    }

    a:hover {
      color: #94a3b8;
      transform: scale(1.2);
      display: inline-block;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 31px;
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--text);
    }

    .title {
      font-size: 12.5px;
      font-weight: 800;
      color: var(--primary);
      margin: 15px 0px;
    }

    .summary {
      padding: 10px 0px;
    }

    .summary p {
      color: #374151;
      font-size: 10.8px;
      line-height: 1.52;
      margin: 0 0 6px;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px;
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary-dark);
    }

    .section-title::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
    }

    .highlights {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .highlight-card {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 9px;
      min-height: 54px;
    }

    .highlight-card strong {
      display: block;
      color: var(--primary-dark);
      font-size: 13.5px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .highlight-card span {
      display: block;
      color: var(--muted);
      font-size: 8.8px;
      line-height: 1.25;
    }

    .job {
      position: relative;
      padding-left: 18px;
      margin-bottom: 12px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .job::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 7px;
      bottom: -9px;
      width: 1px;
      background: var(--line);
    }

    .job:last-child::before {
      display: none;
    }

    .job::after {
      content: "";
      position: absolute;
      left: 0;
      top: 5px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 5px;
    }

    .company {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.18;
    }

    .role {
      font-size: 10.3px;
      color: var(--primary);
      font-weight: 800;
      margin-top: 2px;
    }

    .period {
      white-space: nowrap;
      color: var(--muted);
      font-size: 9.5px;
      font-weight: 800;
      padding-top: 2px;
    }

    .job ul {
      margin: 5px 0 0;
      padding-left: 14px;
    }

    .job li {
      color: #374151;
      font-size: 9.8px;
      line-height: 1.38;
      margin-bottom: 3px;
    }

    @media (max-width: 900px) {
      .resume {
        width: 100%;
        height: auto;
        min-height: auto;
        aspect-ratio: auto;
        overflow: visible;
        grid-template-columns: 1fr;
      }

      .main,
      .sidebar {
        padding: 26px 22px;
      }

      h1 {
        font-size: 32px;
      }

      .highlights {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1400px) {
      .page-wrap {
        padding: 48px 36px 72px;
      }

      .sidebar {
        padding: 34px 26px;
      }

      .main {
        padding: 40px 52px 34px;
      }

      .avatar {
        width: 82px;
        height: 82px;
        font-size: 28px;
      }

      .sidebar h2 {
        font-size: 11.5px;
      }

      h1 {
        font-size: 46px;
      }

      .title {
        font-size: 17px;
      }

      .summary p {
        font-size: 13.8px;
      }

      .section-title {
        font-size: 13.8px;
      }

      .highlight-card strong {
        font-size: 18px;
      }

      .highlight-card span,
      .contact-item,
      .sidebar p,
      .sidebar li {
        font-size: 12px;
      }

      .company {
        font-size: 17px;
      }

      .role {
        font-size: 13px;
      }

      .job li {
        font-size: 12px;
      }
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 0;
      }

      html,
      body {
        width: 210mm;
        height: 297mm;
        background: #fff !important;
        overflow: hidden !important;
      }

      .toolbar {
        display: none !important;
      }

      .page-wrap {
        width: 210mm;
        height: 297mm;
        padding: 0 !important;
        margin: 0 !important;
        overflow: hidden !important;
      }

      .resume {
        width: 210mm !important;
        height: 297mm !important;
        margin: 0 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        overflow: hidden !important;
        display: grid !important;
        grid-template-columns: 66mm 144mm !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      .sidebar,
      .main,
      .highlight-card,
      .tag,
      .avatar {
        print-color-adjust: exact !important;
        -webkit-print-color-adjust: exact !important;
      }

      .sidebar {
        height: 297mm !important;
      }

      .main {
        height: 297mm !important;
      }
    }
  </style>
</head>

            "Transformed a monolithic system into a scalable white-label platform.",
            "Reduced time-to-market by 60% with architectural and technology standards.",
            "Migrated legacy systems to a modern Java architecture.",
            "Reduced technical debt by 70% through strategic refactoring."
          ]
        },
        {
          company: "Ewave",
          role: "Full Stack Developer",
          period: "2019 - 2021",
          bullets: [
            "Developed critical systems for CCEE.",
            "Created a scalable reporting system, increasing capacity from 50k to 300k reports/day.",
            "Used parallel processing and messaging for resilience and automatic reprocessing.",
            "Worked end-to-end from planning through deployment."
          ]
        },
        {
          company: "Universidade de Fortaleza",
          role: "Full Stack Developer",
          period: "2016 - 2018",
          bullets: [
            "Developed web and mobile applications for internal and external projects.",
            "Worked on data modeling, backend, frontend, and system maintenance."
          ]
        }
      ],
      education: [
        { course: "Specialization in Artificial Intelligence", school: "University of São Paulo - USP" },
        { course: "Computer Science", school: "University of Fortaleza - UNIFOR" },
        { course: "Teaching Degree in Computer Science", school: "State University of Ceará - UECE" }
      ],
      certifications: [
        "Advanced JavaScript: ES6, OOP and Design Patterns",
        "Lean Startup",
        "Regular Expressions"
      ]
    };

    const copy = {
      pt: {
        title: "Currículo - Wemy Felipe",
        lang: "pt-BR",
        sections: {
          contact: "Contato",
          stack: "Stack Principal",
          education: "Formação",
          certifications: "Certificações",
          highlights: "Destaques",
          experience: "Experiência Profissional"
        },
        buttons: {
          print: "Exportar PDF"
        }
      },
      en: {
        title: "Resume - Wemy Felipe",
        lang: "en",
        sections: {
          contact: "Contact",
          stack: "Main Stack",
          education: "Education",
          certifications: "Certifications",
          highlights: "Highlights",
          experience: "Professional Experience"
        },
        buttons: {
          print: "Export PDF"
        }
      }
    };

    function createTags(items) {
      return items.map(item => `<span class="tag">${item}</span>`).join("");
    }

    function renderResume(data, lang) {
      const texts = copy[lang] || copy.pt;
      const resume = document.getElementById("resume");

      resume.innerHTML = `
        <aside class="sidebar">
          <div class="avatar">
            <img src="perfil.png" alt="Foto de perfil" style="width:100%;height:100%;object-fit:cover;border-radius:20px;" />
          </div>

          <h2>${texts.sections.contact}</h2>
          <div class="contact-item">📍 ${data.location}</div>
          <div class="contact-item">
            <a href="mailto:${data.email}"  target="_blank"">
              📧 ${data.email}
            </a>
          </div>
          <div class="contact-item">📱 ${data.phone}</div>
          <div class="contact-item">
            <a href="https://${data.linkedin}" target="_blank">
              🔗 ${data.linkedin}
            </a>
          </div>

          <h2>${texts.sections.stack}</h2>
          ${data.skills.map(skill => `
            <div class="skill-group">
              <strong>${skill.group}</strong>
              <div class="tags">${createTags(skill.items)}</div>
            </div>
          `).join("")}

          <h2>${texts.sections.education}</h2>
          ${data.education.map(item => `
            <div class="education-item">
              <strong>${item.course}</strong>
              <span>${item.school}</span>
            </div>
          `).join("")}

          <h2>${texts.sections.certifications}</h2>
          ${data.certifications.map(item => `
            <div class="certification-item">
              <strong>${item}</strong>
            </div>
          `).join("")}
        </aside>

        <section class="main">
          <header class="hero">
            <h1>${data.name}</h1>
            <div class="title">${data.title}</div>
            <div class="summary">
              ${data.summary.map(paragraph => `<p>${paragraph}</p>`).join("")}
            </div>
          </header>

          <section class="section">
            <h2 class="section-title">${texts.sections.highlights}</h2>
            <div class="highlights">
              ${data.highlights.map(item => `
                <div class="highlight-card">
                  <strong>${item.value}</strong>
                  <span>${item.label}</span>
                </div>
              `).join("")}
            </div>
          </section>

          <section class="section">
            <h2 class="section-title">${texts.sections.experience}</h2>
            ${data.experience.map(job => `
              <div class="job">
                <div class="job-header">
                  <div>
                    <div class="company">${job.company}</div>
                    <div class="role">${job.role}</div>
                  </div>
                  <div class="period">${job.period}</div>
                </div>
                <ul>
                  ${job.bullets.map(bullet => `<li>${bullet}</li>`).join("")}
                </ul>
              </div>
            `).join("")}
          </section>
        </section>
      `;
    }

    function setLanguage(lang) {
      const normalized = lang === "en" ? "en" : "pt";
      const data = normalized === "en" ? cvDataEn : cvDataPt;
      const texts = copy[normalized];

      document.documentElement.lang = texts.lang;
      document.title = texts.title;
      document.getElementById("btn-print").textContent = texts.buttons.print;
      document.getElementById("btn-pt").classList.toggle("active", normalized === "pt");
      document.getElementById("btn-en").classList.toggle("active", normalized === "en");

      renderResume(data, normalized);
      try {
        localStorage.setItem("resume-language", normalized);
      } catch (error) {
        // Ignore storage failures and keep the current session language only.
      }
    }

    document.getElementById("btn-print").addEventListener("click", () => window.print());
    document.querySelectorAll("[data-lang]").forEach(button => {
      button.addEventListener("click", () => setLanguage(button.dataset.lang));
    });

    let savedLanguage = null;
    try {
      savedLanguage = localStorage.getItem("resume-language");
    } catch (error) {
      savedLanguage = null;
    }
    setLanguage(savedLanguage === "en" ? "en" : "pt");
  </script>
</body>
</html>
